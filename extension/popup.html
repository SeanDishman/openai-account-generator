<!DOCTYPE html>
<!-- https://github.com/SeanDishman/openai-account-generator -->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        width: 250px;
        padding: 12px 14px;
        background: #0a0a0a;
        color: #00ff66;
        font: 13px/1.5 "Consolas", "SFMono-Regular", Menlo, monospace;
      }
      h1 {
        font-size: 12px;
        letter-spacing: 1px;
        margin: 0 0 12px;
        color: #00ff66;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 8px 0;
      }
      .muted {
        color: #0a7d3f;
      }
      #proxy {
        word-break: break-all;
        text-align: right;
        margin-left: 8px;
        color: #00ff66;
      }
      #pool {
        color: #0a7d3f;
      }
      /* toggle switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #2a2a2a;
        border: 1px solid #133;
        border-radius: 24px;
        cursor: pointer;
        transition: 0.15s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 2px;
        top: 2px;
        background: #777;
        border-radius: 50%;
        transition: 0.15s;
      }
      input:checked + .slider {
        background: #003b1e;
        border-color: #00ff66;
      }
      input:checked + .slider::before {
        transform: translateX(20px);
        background: #00ff66;
      }
      button {
        width: 100%;
        margin-top: 6px;
        padding: 7px;
        background: #001a0d;
        color: #00ff66;
        border: 1px solid #00ff66;
        border-radius: 4px;
        cursor: pointer;
        font: 12px "Consolas", monospace;
      }
      button:hover {
        background: #003b1e;
      }
      hr {
        border: none;
        border-top: 1px solid #123;
        margin: 12px 0 8px;
      }
    </style>
  </head>
  <body>
    <h1>OPENAI AUTO-SIGNUP</h1>

    <div class="row">
      <span>Enabled</span>
      <label class="switch">
        <input type="checkbox" id="toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span class="muted">proxy</span>
      <span id="proxy">…</span>
    </div>

    <div class="row">
      <span class="muted">pool</span>
      <span id="pool" class="muted">…</span>
    </div>

    <hr />

    <button id="openTab">Open signup tab</button>
    <button id="rotate">Rotate proxy now</button>

    <script src="popup.js"></script>
  </body>
</html>
